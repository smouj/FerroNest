# ============================================================
# FerroNest - GitHub Pages Deployment Workflow
# Builds Next.js as a static site and deploys to GitHub Pages
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install

      - name: Configure for static export
        run: |
          cat > next.config.ts << 'EOF'
          import type { NextConfig } from "next";

          const nextConfig: NextConfig = {
            output: "export",
            images: {
              unoptimized: true,
            },
            basePath: "/FerroNest",
            assetPrefix: "/FerroNest",
            typescript: {
              ignoreBuildErrors: true,
            },
            reactStrictMode: false,
          };

          export default nextConfig;
          EOF

      - name: Build static site
        run: bun run build
        env:
          CI: true

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
